<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=3">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=3">
  <link rel="apple-touch-icon" href="/icon-192.png?v=3">

  <title>Elige tu país – Tu Cálculo</title>
  <link rel="stylesheet" href="/css/calculando.css">
</head>
<body>
  <main style="max-width:520px;margin:40px auto;padding:0 16px;">
    <header style="display:flex;align-items:center;gap:12px;justify-content:space-between;">
      <div class="logo-block">
        <div class="logo-mark">TC</div>
        <div class="logo-text">
          <strong>Tu Cálculo</strong>
          <span>Elige dónde quieres navegar</span>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:14px;">
        <button id="themeToggle" class="theme-toggle" type="button">
          <span class="theme-toggle-icon" id="themeIcon">🌙</span>
          <span id="themeLabel">Modo oscuro</span>
        </button>

        <!-- Estás en la página de selección, así que este link es opcional -->
        <span
          style="font-size:13px;opacity:.75;white-space:nowrap;"
          aria-hidden="true"
        >
          Cambiar país
        </span>
      </div>
    </header>

    <section class="shell" style="margin-top:18px;">
      <div class="tool-title">Elige tu país</div>
      <div class="tool-subtitle" style="margin-top:8px;">
        Esto ajusta las calculadoras y la navegación.
      </div>

      <!-- ===== Sudamérica ===== -->
      <div class="tool-title" style="margin-top:18px;">Sudamérica</div>
      <div style="display:grid;gap:12px;margin-top:12px;">
        <button id="btnArgentina" class="pill" style="justify-content:center;">🇦🇷 Argentina</button>
        <button id="btnBolivia" class="pill" style="justify-content:center;">🇧🇴 Bolivia</button>
        <button id="btnBrasil" class="pill" style="justify-content:center;">🇧🇷 Brasil</button>
        <button id="btnChile" class="pill" style="justify-content:center;">🇨🇱 Chile</button>
        <button id="btnColombia" class="pill" style="justify-content:center;">🇨🇴 Colombia</button>
        <button id="btnEcuador" class="pill" style="justify-content:center;">🇪🇨 Ecuador</button>
        <button id="btnParaguay" class="pill" style="justify-content:center;">🇵🇾 Paraguay</button>
        <button id="btnPeru" class="pill" style="justify-content:center;">🇵🇪 Perú</button>
        <button id="btnUruguay" class="pill" style="justify-content:center;">🇺🇾 Uruguay</button>
        <button id="btnVenezuela" class="pill" style="justify-content:center;">🇻🇪 Venezuela</button>
      </div>

      <!-- ===== Centroamérica ===== -->
      <div class="tool-title" style="margin-top:22px;">Centroamérica</div>
      <div style="display:grid;gap:12px;margin-top:12px;">
        <button id="btnCostaRica" class="pill" style="justify-content:center;">🇨🇷 Costa Rica</button>
        <button id="btnElSalvador" class="pill" style="justify-content:center;">🇸🇻 El Salvador</button>
        <button id="btnGuatemala" class="pill" style="justify-content:center;">🇬🇹 Guatemala</button>
        <button id="btnHonduras" class="pill" style="justify-content:center;">🇭🇳 Honduras</button>
        <button id="btnNicaragua" class="pill" style="justify-content:center;">🇳🇮 Nicaragua</button>
        <button id="btnPanama" class="pill" style="justify-content:center;">🇵🇦 Panamá</button>
      </div>

      <!-- ===== Caribe ===== -->
      <div class="tool-title" style="margin-top:22px;">Caribe</div>
      <div style="display:grid;gap:12px;margin-top:12px;">
        <button id="btnCuba" class="pill" style="justify-content:center;">🇨🇺 Cuba</button>
        <button id="btnRepublicaDominicana" class="pill" style="justify-content:center;">🇩🇴 República Dominicana</button>
        <button id="btnPuertoRico" class="pill" style="justify-content:center;">🇵🇷 Puerto Rico</button>
      </div>

      <!-- ===== Norteamérica ===== -->
      <div class="tool-title" style="margin-top:22px;">Norteamérica</div>
      <div style="display:grid;gap:12px;margin-top:12px;">
        <button id="btnEstadosUnidos" class="pill" style="justify-content:center;">🇺🇸 Estados Unidos (Español)</button>
        <button id="btnMexico" class="pill" style="justify-content:center;">🇲🇽 México</button>
      </div>

      <!-- ===== Europa ===== -->
      <div class="tool-title" style="margin-top:22px;">Europa</div>
      <div style="display:grid;gap:12px;margin-top:12px;">
        <button id="btnEspana" class="pill" style="justify-content:center;">🇪🇸 España</button>
      </div>

      <!-- ===== África ===== -->
      <div class="tool-title" style="margin-top:22px;">África</div>
      <div style="display:grid;gap:12px;margin-top:12px;">
        <button id="btnGuineaEcuatorial" class="pill" style="justify-content:center;">🇬🇶 Guinea Ecuatorial</button>
      </div>
    </section>
  </main>

  <script src="/js/theme-toggle.js"></script>
  <script>
    (function setupCountrySelectionStandalone() {
      const REGION_KEY = 'tc_region';

      const buttons = {
        // Sudamérica
        ar: document.getElementById('btnArgentina'),
        bo: document.getElementById('btnBolivia'),
        br: document.getElementById('btnBrasil'),
        cl: document.getElementById('btnChile'),
        co: document.getElementById('btnColombia'),
        ec: document.getElementById('btnEcuador'),
        py: document.getElementById('btnParaguay'),
        pe: document.getElementById('btnPeru'),
        uy: document.getElementById('btnUruguay'),
        ve: document.getElementById('btnVenezuela'),

        // Centroamérica
        cr: document.getElementById('btnCostaRica'),
        sv: document.getElementById('btnElSalvador'),
        gt: document.getElementById('btnGuatemala'),
        hn: document.getElementById('btnHonduras'),
        ni: document.getElementById('btnNicaragua'),
        pa: document.getElementById('btnPanama'),

        // Caribe
        cu: document.getElementById('btnCuba'),
        do: document.getElementById('btnRepublicaDominicana'),
        pr: document.getElementById('btnPuertoRico'),

        // Norteamérica
        us: document.getElementById('btnEstadosUnidos'),
        mx: document.getElementById('btnMexico'),

        // Europa
        es: document.getElementById('btnEspana'),

        // África
        gq: document.getElementById('btnGuineaEcuatorial'),
      };

      const routes = {
        ar: '/ar/',
        bo: '/bo/',
        br: '/br/',
        cl: '/cl/',
        co: '/co/',
        ec: '/ec/',
        py: '/py/',
        pe: '/pe/',
        uy: '/uy/',
        ve: '/ve/',

        cr: '/cr/',
        sv: '/sv/',
        gt: '/gt/',
        hn: '/hn/',
        ni: '/ni/',
        pa: '/pa/',

        cu: '/cu/',
        do: '/do/',
        pr: '/pr/',

        us: '/us/',
        mx: '/mx/',

        es: '/es/',
        gq: '/gq/',
      };

      function storeRegion(region) {
        try { localStorage.setItem(REGION_KEY, region); } catch (e) {}
      }

      function go(region) {
        storeRegion(region);
        window.location.href = routes[region] || '/cl/';
      }

      Object.entries(buttons).forEach(([region, btn]) => {
        if (btn) btn.addEventListener('click', () => go(region));
      });
    })();
  </script>
  <script src="/js/faq.js"></script>
</body>
</html>
